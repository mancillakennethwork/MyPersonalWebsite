<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balance Paid — KenSaMa</title>
  <meta name="description" content="Your final balance has been received. Your order is now fully paid." />
  <link rel="icon" href="Logo/kensama-logo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="site-header"></header>

  <main>
    <section class="section">
      <div class="container">
        <div class="pay-success reveal" style="max-width: 640px; margin: 20px auto 0;">
          <div class="pay-success__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
          </div>
          <h1>Balance paid — all settled! ✅</h1>
          <p>Your final balance has been received. Your order is now fully paid. Thank you for your trust in KenSaMa!</p>

          <div class="pay-success__notice">
            <strong>Order: <span id="orderId">—</span></strong>
            This order is now fully paid. If you need anything else, just reach out.
          </div>

          <div class="btn-row" style="justify-content: center;">
            <a href="index.html" class="btn btn-primary">Back to Home</a>
            <a href="contact.html" class="btn btn-outline">Contact Me</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>
  <script src="script.js"></script>
  <script>
    const orderId = new URLSearchParams(window.location.search).get('order');
    if (orderId) document.getElementById('orderId').textContent = orderId;
  </script>
</body>
</html>
